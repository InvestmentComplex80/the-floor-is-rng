<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Floor is RNG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="game-container">
    <div id="ui">
        <div class="stats-bar">
            <span id="score-display">Score: 0</span>
            <span id="level-display">Level: 1</span>
        </div>
        <h1 id="rule-display">Rule: NORMAL</h1>
    </div>

    <div id="overlay">
        <h2 id="overlay-title">THE FLOOR IS RNG</h2>
        <p id="overlay-desc">Tap anywhere to start the Audio Engine and begin the chaos.</p>
        
        <div id="leaderboard-display" class="hidden">
            <h3>TOP RUNS</h3>
            <ul id="high-score-list"></ul>
            <p style="font-size: 16px; margin-top: 20px; color: #aaa;">[ Tap anywhere to Play ]</p>
        </div>
    </div>

    <div id="name-entry-screen" class="hidden">
        <h2>NEW HIGH SCORE!</h2>
        <p>ENTER YOUR INITIALS:</p>
        <input type="text" id="initials-input" maxlength="3" autocomplete="off" spellcheck="false">
        <button id="submit-score">SUBMIT</button>
    </div>

    <div id="boss-warning" class="hidden">WARNING: BOSS ANOMALY DETECTED</div>

    <div id="dpad">
        <button id="btn-up">▲</button>
        <div class="dpad-row">
            <button id="btn-left">◀</button>
            <button id="btn-down">▼</button>
            <button id="btn-right">▶</button>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
</div>

<script src="script.js"></script>
</body>
</html>
